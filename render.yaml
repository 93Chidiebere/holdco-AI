services:
  - type: web
    name: holdco-ai-backend
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: holdco-ai-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: holdco-ai-db
    databaseName: holdco_db
    user: holdco_user
